<div
  class="github-component d-flex flex-column flex-justify-between height-full text-left {% if site.style == 'dark' %}box-shadow{% else %}border border-gray-light{% endif %} bg-white rounded-1 p-3"
>
  <div>
    <div class="d-flex flex-justify-between flex-items-start mb-1">
      <h1 class="f4 lh-condensed mb-1">
        {% octicon globe height:20 class:"mr-1 v-align-middle" fill:"#586069"
        aria-label:repo %}
        <a href="{{ project.url }}"> {{ project.title }} </a>
      </h1>
    </div>
    <div class="text-gray mb-2 ws-normal">{{ project.description }}</div>
  </div>
  <div class="d-flex f6" class="d-inline-block link-gray mr-4">
    {% octicon link height:16 class:"mr-1 v-align-middle" fill:"#586069"
    aria-label:repo %}
    <a href="{{ project.url }}"> {{ project.url }} </a>
  </div>
</div>
